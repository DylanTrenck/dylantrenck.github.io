<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: rgba(255,255,255,0.08);
      --text: #f0f0f0;
      --muted: #888;
      --accent: #f0f0f0;
      --radius: 10px;
      --font: 'Georgia', serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      width: 100%;
      max-width: 360px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
    }

    .eyebrow {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: monospace;
      margin-bottom: 6px;
    }

    h1 {
      font-size: 22px;
      font-weight: normal;
      color: var(--text);
      margin-bottom: 2rem;
      line-height: 1.2;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: monospace;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 14px;
      color: var(--text);
      font-family: monospace;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus {
      border-color: rgba(255,255,255,0.25);
    }

    button {
      width: 100%;
      margin-top: 8px;
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      padding: 11px;
      font-size: 13px;
      font-family: monospace;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .error {
      margin-top: 12px;
      font-size: 12px;
      color: #e24b4a;
      font-family: monospace;
      text-align: center;
      min-height: 18px;
    }

    .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #639922;
      margin-right: 6px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="eyebrow"><span class="dot"></span>Private access</p>
    <h1>Life dashboard</h1>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button id="btn" onclick="login()">Sign in</button>
    <p class="error" id="err"></p>
  </div>

  <script>
    // ─── PASTE YOUR SUPABASE CREDENTIALS HERE ───────────────────────────────
    const SUPABASE_URL = 'https://xvythftjyaedeetjpmmi.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh2eXRoZnRqeWFlZGVldGpwbW1pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjYzNjYsImV4cCI6MjA5MTI0MjM2Nn0.eYXcO67GG7zLbtdWCzyGkjxf6bjGPM0a3lyCfMybJAs'
    // ────────────────────────────────────────────────────────────────────────

    const { createClient } = supabase
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    // If already logged in, go straight to board
    sb.auth.getSession().then(({ data }) => {
      if (data.session) window.location.href = 'board.html'
    })

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') login()
    })

    async function login() {
      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value
      const btn = document.getElementById('btn')
      const err = document.getElementById('err')

      if (!email || !password) {
        err.textContent = 'Enter your email and password.'
        return
      }

      btn.disabled = true
      btn.textContent = 'Signing in...'
      err.textContent = ''

      const { error } = await sb.auth.signInWithPassword({ email, password })

      if (error) {
        err.textContent = 'Wrong credentials. Try again.'
        btn.disabled = false
        btn.textContent = 'Sign in'
      } else {
        window.location.href = 'board.html'
      }
    }
  </script>
</body>
</html>
